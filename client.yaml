generatorName: typescript-fetch
inputSpec: openapi-down.json
outputDir: ./src

additionalProperties:
  # Emit snake_case property names so ToJSON sends only snake_case (no extra camelCase keys)
  modelPropertyNaming: snake_case
  # Package info
  packageName: amgix_client
  projectName: amgix-client
  packageVersion: 1.0.0-beta1
  packageUrl: https://github.com/amgix/amgix-client-typescript
  basePath: "http://localhost:8234"
  host: "localhost:8234"

  # Type hints
  generateSourceCodeOnly: false
  
  # Skip generating tests (they're usually not great anyway)
  # hideGenerationTimestamp: true

  # useOneOfDiscriminatorLookup: true

# Global properties
globalProperties:
  # Skip models/APIs you don't need
  # models: ""
  # apis: ""
  
  # Debugging
  # debugModels: true
  # debugApis: true
  # debugOperations: true
  # debugOpenAPI: true

# Template customization (advanced)
# templateDir: ./custom-templates

# Import mappings (if you want to use your own types)
# importMappings:
#   Pet: com.yourcompany.models.Pet

  apiTests: false
  modelTests: false 
  # openapi-normalizer: SIMPLIFY_ONEOF_ANYOF=true
